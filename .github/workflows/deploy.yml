name: Deploy Frontend to VPS Production

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Łączenie z serwerem i restart Dockera dla Frontendu
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # WAŻNE: Tu wstawiamy prawidłową ścieżkę do frontendu!
            cd /home/mateusz/hw_app/TUTAJ_WPISZ_FOLDER_FRONTENDU
            
            git pull origin production
            docker compose up -d --build