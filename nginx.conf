server {
    listen 80;
    server_name konfigurator.czapkifirmowe.pl www.konfigurator.czapkifirmowe.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
server {
    listen 443 ssl;
    server_name konfigurator.czapkifirmowe.pl www.konfigurator.czapkifirmowe.pl;
    ssl_certificate /etc/letsencrypt/live/konfigurator.czapkifirmowe.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konfigurator.czapkifirmowe.pl/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- CACHE DLA GRAFIK I CZCIONEK (Zmniejsza LCP) ---
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Blokada botów (którą miałeś wcześniej)
    if ($http_user_agent ~* (python|httpx|curl|wget|libwww|perl|java|Go-http-client|axios|Censys|Nmap|sqlmap|Nikto)) {
        return 403;
    }

    # FRONTEND (Vue)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # BACKEND (Spring Boot)
    location /api/ {
        # Używamy nazwy serwisu "backend" z docker-compose
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}