# 1. Przekierowanie z HTTP na HTTPS
server {
    listen 80;
    server_name konfigurator.czapkifirmowe.pl www.konfigurator.czapkifirmowe.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Główna konfiguracja HTTPS
server {
    listen 443 ssl;
    server_name konfigurator.czapkifirmowe.pl www.konfigurator.czapkifirmowe.pl;

    # Ścieżki do certyfikatów (wewnątrz kontenera!)
    ssl_certificate /etc/letsencrypt/live/konfigurator.czapkifirmowe.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konfigurator.czapkifirmowe.pl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Blokada botów (którą miałeś wcześniej)
    if ($http_user_agent ~* (python|httpx|curl|wget|libwww|perl|java|Go-http-client|axios|Censys|Nmap|sqlmap|Nikto)) {
        return 403;
    }

    # FRONTEND (Vue)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # BACKEND (Spring Boot)
    location /api/ {
        # Używamy nazwy serwisu "backend" z docker-compose
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}